name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Package extension
        run: |
          cd src
          zip -r "../uoi-accessibility-suite-v${{ env.VERSION }}.xpi" .
          zip -r "../uoi-accessibility-suite-v${{ env.VERSION }}.zip" .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            uoi-accessibility-suite-v${{ env.VERSION }}.xpi
            uoi-accessibility-suite-v${{ env.VERSION }}.zip
          generate_release_notes: true
