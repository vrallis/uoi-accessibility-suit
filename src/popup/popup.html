<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 240px;
      margin: 0;
      padding: 10px;
      font-family: Arial, sans-serif;
      font-size: 13px;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #ddd;
    }
    .tabs {
      display: flex;
      margin-bottom: 12px;
      border-bottom: 1px solid #ccc;
    }
    .tab-btn {
      flex: 1;
      padding: 6px 4px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      color: #555;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .tab-btn.active {
      background: #e8f0fe;
      border-bottom-color: #1a73e8;
      font-weight: bold;
      color: #1a73e8;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    button.action {
      width: 100%;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    label {
      display: block;
      margin-bottom: 8px;
      cursor: pointer;
    }

    /* ? icon */
    .tab-help {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      font-size: 10px;
      font-weight: bold;
      color: #888;
      border: 1px solid #bbb;
      border-radius: 50%;
      cursor: help;
      flex-shrink: 0;
      line-height: 1;
    }
    .tab-btn.active .tab-help {
      color: #1a73e8;
      border-color: #1a73e8;
    }

    /* tooltip div — fixed so it never overflows the popup window */
    #tooltip {
      display: none;
      position: fixed;
      bottom: 36px;
      left: 8px;
      right: 8px;
      background: #333;
      color: #fff;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.4;
      pointer-events: none;
      z-index: 100;
    }
    #tooltip.visible { display: block; }

    /* footer */
    .footer {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #777;
      font-size: 11px;
    }
    .footer-right {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .lang-toggle {
      background: none;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      cursor: pointer;
      color: #555;
      line-height: 1.4;
    }
    .lang-toggle:hover { border-color: #888; color: #333; }
    .github-link {
      text-decoration: none;
      color: #333;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }
    .github-link:hover { color: #000; }
    .github-icon { width: 14px; height: 14px; fill: currentColor; }
  </style>
</head>
<body>
  <h1 id="extName"></h1>

  <div class="tabs" role="tablist">
    <button class="tab-btn active" data-tab="ecourse" id="tabBtnEcourse" role="tab" aria-selected="true">
      <span class="tab-label" id="tabLabelEcourse"></span>
      <span class="tab-help" id="helpEcourse" aria-hidden="true"></span>
    </button>
    <button class="tab-btn" data-tab="modip" id="tabBtnModip" role="tab" aria-selected="false">
      <span class="tab-label" id="tabLabelModip"></span>
      <span class="tab-help" id="helpModip" aria-hidden="true"></span>
    </button>
  </div>

  <div class="tab-panel active" id="panel-ecourse" role="tabpanel" aria-labelledby="tabBtnEcourse">
    <button class="action" id="expandAllBtn"></button>
  </div>

  <div class="tab-panel" id="panel-modip" role="tabpanel" aria-labelledby="tabBtnModip">
    <label><input type="checkbox" id="layoutFix"> <span id="layoutFixLabel"></span></label>
    <label><input type="checkbox" id="a11yFix"> <span id="a11yFixLabel"></span></label>
  </div>

  <div class="footer">
    <span>&#9829; made with love by the Orailab team</span>
    <div class="footer-right">
      <button id="langToggle" class="lang-toggle"></button>
      <a href="https://github.com/vrallis/uoi-accessibility-suit"
         target="_blank"
         rel="noopener noreferrer"
         class="github-link"
         title="Source Code">
        <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true">
          <path fill-rule="evenodd"
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
               0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
               -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
               .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
               -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0
               1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
               1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
               1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
    </div>
  </div>

  <div id="tooltip"></div>
  <script src="popup.js"></script>
</body>
</html>
